<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      line-height: 1.6;
      background: #f9f9f9;
      color: #333;
    }

    header {
      background: #111;
      color: #fff;
      padding: 60px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    header p {
      margin-top: 10px;
      font-size: 1.2rem;
      color: #ccc;
    }

    nav {
      background: #222;
      text-align: center;
      padding: 10px;
      position: sticky;
      top: 0;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-size: 0.95rem;
    }

    nav a:hover {
      color: #00adb5;
    }

    section {
      padding: 60px 20px;
      max-width: 1000px;
      margin: auto;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .about, .contact {
      text-align: center;
    }

    .services, .portfolio {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    footer {
      background: #111;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      background: #00adb5;
      color: #fff;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #008c94;
    }
  </style>
</head>
<body>

<header>
  <h1>Test Design</h1>
  <p>Corporate Gifting | Business Improvement | Freelancer</p>
</header>

<nav>
  <a href="#about">About</a>
  <a href="#services">Services</a>
  <a href="#portfolio">Portfolio</a>
  <a href="#contact">Contact</a>
</nav>

<section id="about" class="about">
  <h2>About Me</h2>
  <p>I help businesses and individuals build modern, fast, and responsive websites.</p>
</section>
</head>
</html>
